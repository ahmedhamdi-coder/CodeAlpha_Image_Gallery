<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>image gallery</title>
</head>
<body>
    <div class="full-img" id="fullimgbox">
        <img src="images/img01.JPG" id="fullimg">
        <span onclick="colsefullimg()">X</span>
        <button class="prev" onclick="changeImg(-1)">&#10094;</button>
        <button class="next" onclick="changeImg(1)">&#10095;</button>
    </div>
    <div class="img-gallery">
        <img src="images/img01.JPG" onclick="openfullimg(this.src)">
        <img src="images/img02.JPG" onclick="openfullimg(this.src)">
        <img src="images/img03.JPG" onclick="openfullimg(this.src)">
        <img src="images/img04.JPG" onclick="openfullimg(this.src)">
        <img src="images/img05.JPG" onclick="openfullimg(this.src)">
        <img src="images/img06.JPG" onclick="openfullimg(this.src)">
        <img src="images/img07.JPG" onclick="openfullimg(this.src)">
        <img src="images/img08.JPG" onclick="openfullimg(this.src)">
        <img src="images/img09.JPG" onclick="openfullimg(this.src)">
        <img src="images/img10.JPG" onclick="openfullimg(this.src)">
        <img src="images/img11.JPG" onclick="openfullimg(this.src)">
        <img src="images/img12.JPG" onclick="openfullimg(this.src)">
        <img src="images/img13.JPG" onclick="openfullimg(this.src)">
        <img src="images/img14.JPG" onclick="openfullimg(this.src)">
        <img src="images/img15.JPG" onclick="openfullimg(this.src)">
        <img src="images/img16.JPG" onclick="openfullimg(this.src)">
        <img src="images/img17.JPG" onclick="openfullimg(this.src)">
    </div>

<script>
        var fullimgbox = document.getElementById("fullimgbox");
        var fullimg = document.getElementById("fullimg");
        var images = Array.from(document.querySelectorAll(".img-gallery img"));
        var currentIndex = 0;

        function openfullimg(pic) {
            fullimgbox.style.display = "flex";
            fullimg.src = pic;
            currentIndex = images.findIndex(img => img.src === pic);
        }

        function colsefullimg() {
            fullimgbox.style.display = "none";
        }

        function changeImg(direction) {
            currentIndex = (currentIndex + direction + images.length) % images.length;
            fullimg.src = images[currentIndex].src;
        }

        document.addEventListener("keydown", function(e) {
            if (fullimgbox.style.display === "none") return;
            if (e.key === "ArrowRight") changeImg(1);
            if (e.key === "ArrowLeft") changeImg(-1);
            if (e.key === "Escape") colsefullimg();
        });
</script>
</body>
</html>
